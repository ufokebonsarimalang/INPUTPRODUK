<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f4f6fb;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

h2,h3{
  text-align:center;
  margin:10px 0;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  margin-top:10px;
}

button:hover{
  background:#1e4fd6;
}

.hidden{ display:none; }

.small{
  font-size:12px;
  color:#666;
}

.badge{
  padding:6px 10px;
  background:#e5e7eb;
  display:inline-block;
  border-radius:6px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card">
  <h2>LOGIN SALES</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>

  <p class="small">Masuk untuk input produk & update harga</p>
</div>

<!-- DASHBOARD -->
<div id="dashBox" class="hidden">

  <!-- 📦 INPUT PRODUK -->
  <div class="card">
    <h3>TAMBAH PRODUK</h3>

    <input id="brand" placeholder="Brand">
    <input id="tipe" placeholder="Tipe">
    <input id="harga" placeholder="Harga">
    <input id="kategori" placeholder="Kategori">

    <input id="s1" placeholder="Spek 1">
    <input id="s2" placeholder="Spek 2">
    <input id="s3" placeholder="Spek 3">
    <input id="s4" placeholder="Spek 4">
    <input id="s5" placeholder="Spek 5">

    <button onclick="addProduk()">SIMPAN PRODUK</button>
  </div>

  <!-- 💰 UPDATE HARGA -->
  <div class="card">
    <h3>UPDATE HARGA</h3>

    <input id="tipeFind" placeholder="Ketik tipe produk">

    <button onclick="cari()">CARI</button>

    <div class="badge">
      Harga lama: <span id="hargaLama">-</span>
    </div>

    <input id="hargaBaru" placeholder="Harga baru">

    <button onclick="updateHarga()">UPDATE HARGA</button>
  </div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzk3x5388GfTr12NFBXG2yXS860b6pKgPTI0byNTEKaZ5euLIbNi93-k6u7qNjpwGt7/exec";

// 🔐 LOGIN
function login(){
  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status=="OK"){
      loginBox.classList.add("hidden");
      dashBox.classList.remove("hidden");
    } else {
      alert("Login gagal");
    }
  });
}

// 📦 ADD PRODUK
function addProduk(){
  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"add",
      brand:brand.value,
      tipe:tipe.value,
      harga:harga.value,
      kategori:kategori.value,
      spek1:s1.value,
      spek2:s2.value,
      spek3:s3.value,
      spek4:s4.value,
      spek5:s5.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status=="OK"){
      alert("Produk berhasil disimpan");
    }
  });
}

// 🔍 CARI PRODUK
function cari(){
  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"find",
      tipe:tipeFind.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status=="OK"){
      hargaLama.innerText = res.harga;
    } else {
      alert("Produk tidak ditemukan");
    }
  });
}

// 💰 UPDATE HARGA
function updateHarga(){
  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"update",
      tipe:tipeFind.value,
      harga:hargaBaru.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status=="OK"){
      alert("Harga berhasil diupdate");
      hargaLama.innerText = hargaBaru.value;
      hargaBaru.value = "";
    } else {
      alert("Gagal update");
    }
  });
}

</script>

</body>
</html>
