<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DASHBOARD SALES</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb;}
.container{max-width:500px;margin:auto;padding:15px;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,0.08);}
input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;}
button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:bold;}
.hidden{display:none;}
h2,h3{text-align:center;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>LOGIN</h2>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">LOGIN</button>
</div>

<!-- DASHBOARD -->
<div id="dashBox" class="hidden">

<div class="card">
<h3>INPUT PRODUK</h3>

<select id="brand"></select>
<input id="tipe" placeholder="Tipe">
<input id="harga" placeholder="Harga">
<select id="kategori"></select>

<input id="s1" placeholder="Spek1">
<input id="s2" placeholder="Spek2">
<input id="s3" placeholder="Spek3">
<input id="s4" placeholder="Spek4">
<input id="s5" placeholder="Spek5">

<button onclick="add()">SIMPAN</button>
</div>

<div class="card">
<h3>UPDATE HARGA</h3>

<input id="tipeFind" placeholder="ketik tipe">
<button onclick="find()">CARI</button>

<p>Harga lama: <span id="hargaLama">-</span></p>

<input id="hargaBaru" placeholder="harga baru">
<button onclick="update()">UPDATE</button>
</div>

</div>

</div>

<script>

const API="PASTE_URL_APPS_SCRIPT";

let brandList=[], kategoriList=[];

// LOGIN
function login(){
fetch(API,{method:"POST",body:new URLSearchParams({
action:"login",user:user.value,pass:pass.value
})})
.then(r=>r.json())
.then(res=>{
if(res.status=="OK"){
loginBox.classList.add("hidden");
dashBox.classList.remove("hidden");
loadMaster();
}else alert("gagal");
});
}

// MASTER DROPDOWN
function loadMaster(){
fetch(API,{method:"POST",body:new URLSearchParams({action:"master"})})
.then(r=>r.json())
.then(res=>{
brandList=res.brand;
kategoriList=res.kategori;

brand.innerHTML=brandList.map(x=>`<option>${x}</option>`).join("");
kategori.innerHTML=kategoriList.map(x=>`<option>${x}</option>`).join("");
});
}

// ADD
function add(){
fetch(API,{method:"POST",body:new URLSearchParams({
action:"add",
brand:brand.value,
tipe:tipe.value,
harga:harga.value,
kategori:kategori.value,
spek1:s1.value,
spek2:s2.value,
spek3:s3.value,
spek4:s4.value,
spek5:s5.value
})})
.then(r=>r.json())
.then(()=>alert("tersimpan"));
}

// FIND
function find(){
fetch(API,{method:"POST",body:new URLSearchParams({
action:"find",tipe:tipeFind.value
})})
.then(r=>r.json())
.then(res=>{
hargaLama.innerText=res.harga||"-";
});
}

// UPDATE
function update(){
fetch(API,{method:"POST",body:new URLSearchParams({
action:"update",
tipe:tipeFind.value,
harga:hargaBaru.value
})})
.then(r=>r.json())
.then(()=>alert("updated"));
}

</script>

</body>
</html>
